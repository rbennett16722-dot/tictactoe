<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Official Lab IQ Assessment</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #00ff41;
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  #terminal {
    width: 100%;
    max-width: 660px;
  }

  .line {
    white-space: pre-wrap;
    line-height: 1.7;
    opacity: 0;
    animation: fadein 0.15s forwards;
  }

  @keyframes fadein {
    to { opacity: 1; }
  }

  .dim { color: #007a1f; }
  .bright { color: #ffffff; font-weight: bold; }
  .red { color: #ff4444; }
  .yellow { color: #ffdd00; }

  #input-row {
    display: none;
    align-items: center;
    margin-top: 4px;
  }

  #prompt-label {
    color: #00ff41;
    white-space: pre-wrap;
  }

  #answer {
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: inherit;
    font-size: inherit;
    flex: 1;
    caret-color: #00ff41;
  }

  #cursor {
    display: inline-block;
    width: 9px;
    height: 1.1em;
    background: #00ff41;
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
    margin-left: 1px;
  }

  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="terminal"></div>
<div id="input-row">
  <span id="prompt-label"></span>
  <input id="answer" type="text" autocomplete="off" spellcheck="false">
  <span id="cursor"></span>
</div>

<script>
  const term = document.getElementById('terminal');
  const inputRow = document.getElementById('input-row');
  const promptLabel = document.getElementById('prompt-label');
  const answerEl = document.getElementById('answer');
  const answers = {};

  function print(text, cls = '', delay = 0) {
    return new Promise(resolve => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'line' + (cls ? ' ' + cls : '');
        div.textContent = text;
        term.appendChild(div);
        window.scrollTo(0, document.body.scrollHeight);
        resolve();
      }, delay);
    });
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function ask(promptText) {
    return new Promise(resolve => {
      promptLabel.textContent = promptText;
      inputRow.style.display = 'flex';
      answerEl.value = '';
      answerEl.focus();

      function submit() {
        const val = answerEl.value.trim() || '...';
        inputRow.style.display = 'none';

        // Echo the answered line into the terminal
        const div = document.createElement('div');
        div.className = 'line';
        div.textContent = promptText + val;
        term.appendChild(div);
        window.scrollTo(0, document.body.scrollHeight);

        resolve(val);
      }

      answerEl.onkeydown = e => { if (e.key === 'Enter') submit(); };
    });
  }

  async function loading(msg, ms) {
    await print(msg, 'dim');
    const div = document.createElement('div');
    div.className = 'line dim';
    div.textContent = '  [';
    term.appendChild(div);

    const total = 30;
    const steps = 10;
    for (let i = 1; i <= steps; i++) {
      await sleep(ms / steps);
      const filled = Math.round((i / steps) * total);
      div.textContent = '  [' + '#'.repeat(filled) + ' '.repeat(total - filled) + ']';
      window.scrollTo(0, document.body.scrollHeight);
    }
    await sleep(200);
  }

  async function run() {
    const SEP = '='.repeat(55);
    const DIV = '-'.repeat(55);

    await print(SEP);
    await print('   OFFICIAL LAB IQ ASSESSMENT v2.7 (Kishore Edition)', 'bright');
    await print(SEP);
    await print('');
    await print('Welcome, Kishore.');
    await print('This is a rigorous scientific evaluation of your');
    await print('cognitive abilities. Please answer honestly.');
    await print('');
    await sleep(1200);

    // Q1
    await print(DIV);
    answers.q1 = await ask('Q1. On a scale of 1-10, how smart do you think you are?  ');
    await print('');
    await loading('Interesting... processing your response with our proprietary neural scoring algorithm...', 2000);
    await print('');

    // Q2
    await print(DIV);
    answers.q2 = await ask('Q2. How many hours of sleep did you get last night?  ');
    await print('');
    await loading('Cross-referencing with global sleep databases...', 2000);
    await print('');

    // Q3
    await print(DIV);
    answers.q3 = await ask('Q3. What is your greatest strength as a researcher?  ');
    await print('');
    await loading('Consulting the academic council...', 2500);
    await print('');

    // Q4 — the setup
    await print(DIV);
    answers.q4 = await ask('Q4. Finally — what do you call a fish without eyes?  ');
    await print('');
    await sleep(800);

    // Results
    await print('');
    await print(SEP);
    await print('         CALCULATING YOUR FINAL SCORE...', 'bright');
    await print(SEP);
    await loading('', 2000);
    await print('');
    await sleep(400);

    await print('OFFICIAL RESULTS FOR: KISHORE', 'bright');
    await print('');
    await sleep(300);
    await print(`  Q1 answer ('${answers.q1}'): irrelevant`, 'dim');
    await sleep(300);
    await print(`  Q2 answer ('${answers.q2}'): also irrelevant`, 'dim');
    await sleep(300);
    await print(`  Q3 answer ('${answers.q3}'): cute, but irrelevant`, 'dim');
    await sleep(300);
    await print(`  Q4 answer ('${answers.q4}'): WRONG.`, 'red');
    await print('');
    await sleep(600);

    await print(SEP);
    await print("  THE CORRECT ANSWER IS: a 'fsh'.", 'yellow');
    await print("  (No eyes = no i's)", 'yellow');
    await print('');
    await print('  FINAL IQ SCORE: NaN', 'red');
    await print('');
    await print('  ASSESSMENT: You survived the test, Kishore.', 'bright');
    await print("              That's already more than we expected.", 'bright');
    await print(SEP);
    await print('');
    await print('  This test was brought to you by your loving lab');
    await print('  mate, who clearly has way too much free time.');
    await print('');

    // hide cursor
    document.getElementById('cursor').style.display = 'none';
  }

  run();
</script>
</body>
</html>
